# ============================================================
# Backtest Profile — spring.profiles.active=backtest
# ============================================================
# Activate LLM caching so backtest replays never hit real Grok API.
# Same market conditions (symbol + price + trend + sentiment + volume + goal)
# will return the cached LLM response deterministically.
agent.llm.cache.enabled=true

# ============================================================
# Kafka — disable listener auto-startup for backtest.
# Prevents continuous reconnection errors when Kafka is not running.
# KafkaTemplate beans remain available but listeners won't try to connect.
# ============================================================
spring.kafka.listener.auto-startup=false
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.auto-offset-reset=earliest
# Set very high reconnect backoff so connection retries happen every 10min
# instead of every 300ms — eliminates log flood when Kafka is unavailable.
spring.kafka.consumer.properties.reconnect.backoff.ms=10000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=600000
spring.kafka.producer.properties.reconnect.backoff.ms=10000
spring.kafka.producer.properties.reconnect.backoff.max.ms=600000
# Increase request timeout to avoid repeated timeout warnings
spring.kafka.consumer.properties.request.timeout.ms=60000
spring.kafka.producer.properties.request.timeout.ms=60000

# Use a dedicated backtest cache directory (separate from live runs)
agent.llm.cache.file-dir=${user.home}/.trading-bot/backtest-llm-cache

# Keep responses cached for 90 days — enough to cover multiple backtest runs
agent.llm.cache.redis-ttl-hours=2160

# Disable live order placement during backtests
rag.order.enabled=false
rag.order.dry-run=true

# Use paper trading exchange during backtest
trading.exchange.provider=paper
trading.kafka.publish.enabled=false

# --- LLM: disable real Grok API; CachedGrokService uses synthetic offline fallback ---
agent.llm.grok.enabled=false

# Use legacy strategy so calls flow: AgentOrchestrator → LegacyLLMStrategy → LLMProvider → CachedGrokService
# LangChain4jStrategy bypasses LLMProvider and calls LangChain4j directly (no cache path)
agent.strategy=legacy

# --- DB: seed one active agent so AgentOrchestrator polling loop has work to do ---
spring.sql.init.data-locations=classpath:data-backtest.sql
spring.sql.init.mode=embedded
spring.jpa.defer-datasource-initialization=true

# ============================================================
# Logging — suppress Kafka NetworkClient noise in backtest
# ============================================================
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.org.springframework.kafka.listener=WARN
