# -----------------------------------------------------------------------
# integration-test profile
# Active for AbstractIntegrationTest and ApiGatewayControllerIntegrationTest.
# Uses H2 in-memory DB + mocked Kafka (KafkaAutoConfiguration excluded by
# FuturesTradingBotIntegrationTestConfig), so no real broker is required.
# -----------------------------------------------------------------------

# Safety defaults — must never be overridden to true in tests
trading.live.enabled=false
rag.order.dry-run=true

# Random ports so parallel test classes don't conflict
server.port=0
grpc.server.port=0

# Kafka (broker URL only; auto-config is excluded in this test context)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=integration-test-group
spring.kafka.producer.properties.auto.create.topics.enable=false

# Allow MockBean / test @Bean to override main beans
spring.main.allow-bean-definition-overriding=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Agent
agent.strategy=langchain4j
agent.throttle.default-ms=0

# Dummy secrets (external services are mocked in tests)
jwt.secret=integration-test-jwt-secret-long-enough-for-hs256
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000
jwt.issuer=simple-trading-bot

llm.api-key=test-llm-key
openai.api.key=test-openai-key
rag.vector-db.api-key=test-pinecone-key
rag.vector-db.environment=test-env
rag.vector-db.index-name=test-index
agent.llm.grok.api-key=test-grok-key
agent.llm.grok.api-url=http://localhost
agent.llm.grok.model=grok-1
agent.llm.grok.temperature=0.7
agent.llm.grok.max-tokens=100
agent.llm.grok.enabled=false

trading.exchange.provider=paper
trading.binance.api.key=test-api-key
trading.binance.api.secret=test-api-secret
trading.dydx.network=testnet
trading.dydx.testnet.url=https://dydx-testnet.bwarelabs.com/v4
trading.dydx.mainnet.url=https://indexer.dydx.trade/v4
trading.dydx.eth.private.key=test-key

# Suppress noisy framework logs
logging.level.org.springframework.kafka=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.tradingbot=INFO
logging.level.org.testcontainers=DEBUG
logging.level.com.github.dockerjava=DEBUG