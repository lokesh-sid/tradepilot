# Test profile configuration to avoid external Kafka dependency

# Use embedded Kafka settings
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=test-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=tradingbot.events

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Disable auto topic creation for tests
spring.kafka.producer.properties.auto.create.topics.enable=false

# Logging for debugging
logging.level.org.springframework.kafka=DEBUG
logging.level.tradingbot.messaging=DEBUG
logging.level.org.testcontainers=DEBUG
logging.level.com.github.dockerjava=DEBUG

# Allow bean overriding for tests to handle mocks and test configs
spring.main.allow-bean-definition-overriding=true
# Dummy values for missing properties to prevent context load failure
jwt.secret=test-only-secret-do-not-use-in-production-x9p3
llm.api-key=test-llm-key
openai.api.key=test-openai-key
rag.vector-db.api-key=test-pinecone-key
rag.vector-db.environment=test-env
rag.vector-db.index-name=test-index
agent.llm.grok.api-key=test-grok-key
agent.llm.grok.api-url=http://localhost
agent.llm.grok.model=grok-1
agent.llm.grok.temperature=0.7
agent.llm.grok.max-tokens=100
agent.llm.grok.enabled=false
trading.exchange.provider=paper

spring.datasource.username=
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
