# -----------------------------------------------------------------------
# Container integration-test profile
# Used by AbstractContainerIntegrationTest (Testcontainers: PostgreSQL + Kafka)
# spring.datasource.url / username / password and
# spring.kafka.bootstrap-servers are injected at runtime by @DynamicPropertySource
# -----------------------------------------------------------------------

# Use real PostgreSQL (URL injected by Testcontainers @DynamicPropertySource)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Random port so multiple test classes can run concurrently
server.port=0
grpc.server.port=0

# Actuator – expose health + prometheus for verification in tests
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.health.redis.enabled=false
management.health.kafka.enabled=false

# Required dummy values (external services are mocked)
jwt.secret=container-test-jwt-secret-that-is-long-enough-for-hs256
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000
jwt.issuer=simple-trading-bot

llm.api-key=test-llm-key
openai.api.key=test-openai-key
rag.vector-db.api-key=test-pinecone-key
rag.vector-db.environment=test-env
rag.vector-db.index-name=test-index
agent.llm.grok.api-key=test-grok-key
agent.llm.grok.api-url=http://localhost
agent.llm.grok.model=grok-1
agent.llm.grok.temperature=0.7
agent.llm.grok.max-tokens=100
agent.llm.grok.enabled=false

trading.exchange.provider=paper
trading.binance.api.key=test-api-key
trading.binance.api.secret=test-api-secret
trading.dydx.network=testnet
trading.dydx.testnet.url=https://dydx-testnet.bwarelabs.com/v4
trading.dydx.mainnet.url=https://indexer.dydx.trade/v4
trading.dydx.eth.private.key=test-key

# Allow bean overriding so test configs can override main beans
spring.main.allow-bean-definition-overriding=true

# Reduce noise in test output
logging.level.org.springframework.kafka=WARN
logging.level.kafka=WARN
logging.level.org.apache.kafka=WARN
logging.level.org.testcontainers=INFO

# ==================== AUTH RATE LIMITING (test override) ====================
# Very high limit so integration tests never hit the rate limiter
resilience4j.ratelimiter.configs.auth-endpoints.limit-for-period=10000
resilience4j.ratelimiter.configs.auth-endpoints.limit-refresh-period=1m
resilience4j.ratelimiter.configs.auth-endpoints.timeout-duration=0s

# Disable refresh-token cleanup scheduling in container tests
auth.refresh-token.cleanup-interval-ms=86400000
