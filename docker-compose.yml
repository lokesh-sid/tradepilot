services:
  # API Gateway — public entry point on port 8080
  gateway:
    build: ./gateway
    container_name: tradepilot-gateway
    ports:
      - "8080:8080"
    depends_on:
      - tradepilot-core
    environment:
      - GATEWAY_PORT=8080
      - BACKEND_URL=http://tradepilot-core:8081
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
    networks:
      - trading-network

  # Trading backend — internal only (not directly exposed in production)
  tradepilot-core:
    build: .
    container_name: tradepilot-core
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - SERVER_PORT=8081
      - SPRING_PROFILES_ACTIVE=prod
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/trading_bot
      - SPRING_DATASOURCE_USERNAME=tradingbot
      - SPRING_DATASOURCE_PASSWORD=tradingbot123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_KAFKA_PRODUCER_CLIENT_ID=tradepilot-producer
      - SPRING_KAFKA_CONSUMER_GROUP_ID=tradepilot
      - TRADING_KAFKA_TOPICS_TRADE_SIGNALS=trading.signals
      - TRADING_KAFKA_TOPICS_TRADE_EXECUTION=trading.executions
      - TRADING_KAFKA_TOPICS_RISK_EVENTS=trading.risk
      - TRADING_KAFKA_TOPICS_MARKET_DATA=trading.market-data
      - TRADING_KAFKA_TOPICS_AGENT_STATUS=trading.agent-status
      - TRADING_EXECUTION_MODE=paper
      - TRADING_EXCHANGE_PROVIDER=paper
      - TRADING_BYBIT_DOMAIN=TESTNET_DOMAIN
      - TRADING_LIVE_ENABLED=false
    networks:
      - trading-network

  # Zookeeper - required for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: tradepilot-zookeeper
    container_name: tradepilot-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - trading-network

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: tradepilot-kafka
    container_name: tradepilot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    networks:
      - trading-network

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    networks:
      - trading-network

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tradepilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: tradingbot
      POSTGRES_PASSWORD: tradingbot123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingbot -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading-network

  # Prometheus – scrapes metrics from /actuator/prometheus
  # prometheus:
  #   image: prom/prometheus:v2.51.0
  #   container_name: tradepilot-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   command:
  #     - "--config.file=/etc/prometheus/prometheus.yml"
  #     - "--storage.tsdb.path=/prometheus"
  #     - "--web.console.libraries=/usr/share/prometheus/console_libraries"
  #     - "--web.console.templates=/usr/share/prometheus/consoles"
  #   depends_on:
  #     - tradepilot-core
  #   networks:
  #     - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
